<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sports Nexus Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🏟️ Sports Nexus Booking System</h1>

    <input id="user" placeholder="Enter Name">

    <select id="court">
        <option>Cricket Turf</option>
        <option>Badminton Court</option>
        <option>Football Ground</option>
    </select>

    <input id="slot" placeholder="Slot (e.g. 10AM-11AM)">

    <button onclick="bookSlot()">Book Slot</button>
    <button onclick="connectBackend()">Check Backend</button>

    <p id="status">Waiting for action...</p>

</div>

<script src="app.js"></script>

</body>
</html>
